backend:
  name: git-gateway
  branch: main # Thay bằng tên nhánh của bạn nếu là master

media_folder: "images"
public_folder: "/images"

collections:
  - name: "portfolio_data"
    label: "Quản lý dữ liệu"
    delete: false
    editor:
      preview: false
    files:
      - file: "data/music.json"
        label: "Danh sách Sáo Trúc"
        name: "music_list"
        fields: # <-- Chỗ này là fields của file music.json
          - name: "songs"
            label: "Các bài sáo trúc"
            widget: "list" # <-- Đảm bảo dòng này ĐÚNG cấp độ thụt lề với name và label
            allow_add: true
            fields: # <-- Đây là các ô nhập liệu bên trong danh sách bài hát
              - { label: "Tiêu đề bài nhạc", name: "title", widget: "string" }
              - { label: "Thể loại", name: "category", widget: "string" }
              - {
                  label: "YouTube Video ID",
                  name: "youtube_id",
                  widget: "string",
                }

      - file: "data/projects.json"
        label: "Danh sách Dự Án"
        name: "project_list"
        fields:
          - name: "projects"
            label: "Các dự án"
            widget: "list"
            allow_add: true
            fields:
              - { label: "Tên dự án", name: "title", widget: "string" }
              - { label: "Phiên bản", name: "version", widget: "string" }
              - { label: "Mô tả", name: "description", widget: "text" }
              - { label: "Công nghệ", name: "tech_stack", widget: "string" }
              - { label: "Link ảnh", name: "image_url", widget: "string" }
              - {
                  label: "Link GitHub/Download",
                  name: "download_url",
                  widget: "string",
                }
